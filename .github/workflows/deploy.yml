name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No infrastructure strings in published docs
        run: |
          if grep -rniE '([0-9]{1,3}\.){3}[0-9]{1,3}|[a-z0-9-]+\.ts\.net|[a-z0-9-]+\.local\b|root@|atlas-ops|\blaunchctl\b|\bsystemctl\b|:30[0-9][0-9]\b|:7878\b|:5432\b' src/content/docs; then
            echo "::error::Infrastructure string found in docs content — refusing to publish."; exit 1;
          fi
          echo "Guard clean."

  build:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        with:
          node-version: 24
        env:
          BASE_PATH: /atlas-dev-docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
